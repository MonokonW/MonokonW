.dp-rule{font-size:clamp(0.48rem,1.8vw,0.6rem);color:rgba(232,121,249,0.5);line-height:1.7;border-left:2px solid rgba(232,121,249,0.2);padding-left:0.6rem;margin-bottom:0.55rem;font-style:italic;}

.dp-list li::before{content:"▸";color:var(--purple);opacity:0.55;flex-shrink:0;margin-top:1px;font-size:0.5rem;}

const LEADERSHIP_STYLES = [

    bullets:["Clear instructions with little room for interpretation","PM makes the final call on all significant decisions","Fast decision-making in time-pressured situations","Risk: team disengagement if used beyond the right context","PRINCE2 link: Managing by exception at a stage where tolerances are tight"],

    bullets:["Clear Work Package with agreed scope, quality, and tolerances","PM available but not involved in day-to-day execution","Team Manager has real decision-making authority within bounds","Connects directly to PRINCE2 Manage by Exception principle","Frees PM to focus on stakeholders, risk, and next-stage planning"],

const STAKEHOLDERS = [
  {

    rule:"The worst outcome with the Project Board is a surprise. Proactive communication and early escalation of problems builds the trust needed to get fast decisions when they matter.",
    bullets:["Highlight Reports at agreed frequency — no more, no less","Exception Reports raised before tolerances are breached, never after","End Stage Reviews with enough preparation time for Board to read and reflect","One-to-one with the Executive before any difficult Board meeting"],
  },
  {
    id:"sh2", name:"End Users / Customer", power:"Medium", interest:"High", attitude:"Supporter",

    bullets:["Named Senior User on the Project Board representing the user community","User involvement in quality reviews of key products","UAT planned as a genuine acceptance gate, not a rubber stamp","Change management approach designed around user adoption"],

    bullets:["Involve in product acceptance criteria for operability","Include in go-live and handover planning from Stage 2","Address support cost and effort concerns transparently","Follow-on action recommendations formally agreed before closure"],
  },
  {

    pc:"#e879f9", ac:"#f59e0b", px:0.28, py:0.85,

    bullets:["Monthly or stage-boundary-only briefings","Business Case health summary prominently visible","Early warning if project is heading for an Exception Plan","No surprises — brief before the formal report arrives"],

    desc:"Third-party organisations providing specialist resources or services. Their delivery performance is a major risk driver. The Senior Supplier role on the Project Board is the formal accountability mechanism.",
    rule:"The contract defines the floor, not the ceiling of the relationship. Suppliers who feel like partners surface problems earlier.",
    bullets:["Senior Supplier on Project Board for significant suppliers","Contractual milestone gates with clear acceptance criteria","Checkpoint Reports from Team Managers who are supplier staff","Risk review specifically covering vendor delivery risk at each stage"],
  },
  {
    id:"sh6", name:"Regulatory / Compliance Body", power:"High", interest:"Low", attitude:"Neutral",
    pc:"#e879f9", ac:"#f59e0b", px:0.22, py:0.80,
    eyebrow:"Stakeholder · Regulatory Body",
    desc:"External authorities whose requirements must be met. They have high power (can block go-live) but low direct interest in day-to-day delivery.",
    rule:"Regulatory requirements discovered at go-live cause the most expensive rework. Engage compliance experts in Stage 1.",
    bullets:["Compliance requirements mapped in Product Descriptions from the start","Legal and compliance counsel involved in quality reviews of high-risk products","Compliance evidence collected continuously, not at the end","Regulatory change monitored as a live risk throughout the project"],
  },
];

const TUCKMAN = [
  {
    id:"forming", label:"Forming", color:"#818cf8",
    eyebrow:"Team Stage · Forming",
    desc:"The team comes together for the first time. Members are polite, cautious, and uncertain about their roles and each other. Limited conflict but also limited productivity.",

  {

  {

const EI = [
  {
    id:"aware", name:"Self-Awareness", domain:"Personal", dc:"#818cf8",

// ── VIEW SWITCHING ────────────────────────────────────────────────────────
document.getElementById("toolbar").addEventListener("click", e => {
  const btn = e.target.closest(".view-tab");
  if(!btn) return;
  document.querySelectorAll(".view-tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  ["leadership","stakeholders","team","change"].forEach(v => {
    document.getElementById("view-"+v).style.display = v===btn.dataset.view ? "" : "none";
  });
  closePanel();
});

// ── PANEL HELPERS ─────────────────────────────────────────────────────────
function buildPanel(eyebrow, title, tabs, renderer) {
  document.getElementById("dpEyebrow").textContent = eyebrow;
  document.getElementById("dpTitle").textContent   = title;
  const tabsEl = document.getElementById("dpTabs");
  tabsEl.innerHTML = tabs.map((t,i) =>
    `<button class="dp-tab${i===0?" active":""}" data-tab="${t.id}">${t.label}</button>`
  ).join("");
  tabsEl.querySelectorAll(".dp-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      tabsEl.querySelectorAll(".dp-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("dpBody").innerHTML = renderer(btn.dataset.tab);
    });
  });
  document.getElementById("dpBody").innerHTML = renderer(tabs[0].id);
  document.getElementById("detailPanel").classList.add("visible");
}
function closePanel() {
  document.getElementById("detailPanel").classList.remove("visible");
  document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
}
document.getElementById("dpClose").addEventListener("click", closePanel);
document.getElementById("mainWrap").addEventListener("click", closePanel);

function listHtml(arr) {
  return `<ul class="dp-list">${arr.map(b=>`<li>${b}</li>`).join("")}</ul>`;
}

// ── SVG HELPER ────────────────────────────────────────────────────────────
const NS = "http://www.w3.org/2000/svg";
function svgEl(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
  return e;
}

function drawPowerMatrix() {
  const svg = document.getElementById("powerSvg");
  const W=420, H=280, PAD=52;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.setAttribute("width",W); svg.setAttribute("height",H);

  const quads = [
    {x:PAD,y:PAD,w:(W-PAD)/2,h:(H-PAD)/2,fill:"rgba(245,158,11,0.05)",label:"Keep satisfied"},
    {x:PAD+(W-PAD)/2,y:PAD,w:(W-PAD)/2,h:(H-PAD)/2,fill:"rgba(232,121,249,0.08)",label:"Manage closely"},
    {x:PAD,y:PAD+(H-PAD)/2,w:(W-PAD)/2,h:(H-PAD)/2,fill:"rgba(80,120,220,0.04)",label:"Monitor"},
    {x:PAD+(W-PAD)/2,y:PAD+(H-PAD)/2,w:(W-PAD)/2,h:(H-PAD)/2,fill:"rgba(52,211,153,0.05)",label:"Keep informed"},
  ];
  quads.forEach(q => {
    svg.appendChild(svgEl("rect",{x:q.x,y:q.y,width:q.w,height:q.h,fill:q.fill,stroke:"rgba(80,120,220,0.07)","stroke-width":"0.5"}));
    const t = svgEl("text",{x:q.x+q.w/2,y:q.y+q.h/2,"font-size":"7","font-family":"DM Mono,monospace",fill:"rgba(80,120,220,0.2)","text-anchor":"middle","dominant-baseline":"middle"});
    t.textContent=q.label; svg.appendChild(t);
  });
  [["Low",H-10],["High",PAD+12]].forEach(([l,y])=>{
    const t=svgEl("text",{x:PAD-6,y,"font-size":"6.5","font-family":"DM Mono,monospace",fill:"rgba(80,120,220,0.4)","text-anchor":"end","dominant-baseline":"middle"});
    t.textContent=l; svg.appendChild(t);
  });
  [["Low",PAD+15],["High",W-8]].forEach(([l,x])=>{
    const t=svgEl("text",{x,y:H,"font-size":"6.5","font-family":"DM Mono,monospace",fill:"rgba(80,120,220,0.4)","text-anchor":"middle"});
    t.textContent=l; svg.appendChild(t);
  });
  const yt=svgEl("text",{x:10,y:(PAD+H)/2,"font-size":"6","font-family":"DM Mono,monospace",fill:"rgba(80,120,220,0.22)","text-anchor":"middle",transform:`rotate(-90,10,${(PAD+H)/2})`});
  yt.textContent="POWER"; svg.appendChild(yt);
  const xt=svgEl("text",{x:(PAD+W)/2,y:H-1,"font-size":"6","font-family":"DM Mono,monospace",fill:"rgba(80,120,220,0.22)","text-anchor":"middle"});
  xt.textContent="INTEREST"; svg.appendChild(xt);

  STAKEHOLDERS.forEach((s,idx) => {
    const cx = PAD + s.px*(W-PAD);
    const cy = PAD + (1-s.py)*(H-PAD);
    const g = document.createElementNS(NS,"g");
    g.style.cursor="pointer";
    g.appendChild(svgEl("circle",{cx,cy,r:14,fill:s.pc+"25",stroke:s.pc+"70","stroke-width":"1.2"}));
    const t=svgEl("text",{x:cx,y:cy,"font-size":"6.5","font-family":"DM Mono,monospace",fill:s.pc,"text-anchor":"middle","dominant-baseline":"middle","font-weight":"500"});
    t.textContent="S"+(idx+1); g.appendChild(t);
    g.addEventListener("click", e => {
      e.stopPropagation();
      document.querySelectorAll("#shList .card").forEach(c=>c.classList.remove("active"));
      const card=document.querySelector(`#shList .card[data-id="${s.id}"]`);
      if(card) card.classList.add("active");
      buildPanel(s.eyebrow, s.name,
        [{id:"strategy",label:"Strategy"},{id:"tips",label:"Key actions"}],
        tab => {
          if(tab==="strategy") return `<p class="dp-desc">${s.desc}</p><p class="dp-rule">${s.rule}</p>`;
          return listHtml(s.bullets);
        });

// ── SHARED FLOW DIAGRAM ───────────────────────────────────────────────────
function drawFlowDiagram(svgId, stages, renderer, tabs) {
  const svg = document.getElementById(svgId);
  const NW=100, NH=44, gap=25;
  const total = stages.length;
  const W = total*NW + (total-1)*gap + 20;
  const H = 160;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.setAttribute("width", W); svg.setAttribute("height", H);

  const defs = document.createElementNS(NS,"defs");
  stages.forEach((s,i) => {
    const m = document.createElementNS(NS,"marker");
    m.setAttribute("id",`arr_${svgId}_${i}`);
    m.setAttribute("markerWidth","7"); m.setAttribute("markerHeight","7");
    m.setAttribute("refX","6"); m.setAttribute("refY","3"); m.setAttribute("orient","auto");
    const p = svgEl("polygon",{points:"0 0,7 3,0 6",fill:s.color+"88"});
    m.appendChild(p); defs.appendChild(m);
  });
  svg.appendChild(defs);

  // Performance curve backdrop
  const pts = stages.map((_,i) => {
    const x = 10 + i*(NW+gap) + NW/2;
    const y = 130 - i * (60/(total-1));
    return `${x} ${y}`;
  });
  svg.appendChild(svgEl("path",{d:"M "+pts.join(" L "),fill:"none",stroke:"rgba(232,121,249,0.1)","stroke-width":"2","stroke-dasharray":"4 3"}));

  stages.forEach((s,i) => {
    const x = 10 + i*(NW+gap);
    const y = 55;

    // Arrow to next
    if(i < stages.length-1) {
      const x1=x+NW+1, y1=y+NH/2, x2=x+NW+gap-1, y2=y+NH/2;
      svg.appendChild(svgEl("line",{x1,y1,x2,y2,stroke:s.color+"55","stroke-width":"1.4","marker-end":`url(#arr_${svgId}_${i})`}));
    }

    const g = document.createElementNS(NS,"g");
    g.style.cursor="pointer"; g.style.opacity="0";
    g.style.animation=`fadeUp 0.35s ease ${i*0.08}s forwards`;

    g.appendChild(svgEl("rect",{x,y,width:NW,height:NH,rx:"5",ry:"5",fill:s.color+"1e",stroke:s.color+"66","stroke-width":"1"}));

    const t1=document.createElementNS(NS,"text");
    t1.setAttribute("x",x+NW/2); t1.setAttribute("y",y+NH/2-6);
    t1.setAttribute("font-size","9"); t1.setAttribute("font-family","DM Mono,monospace");
    t1.setAttribute("text-anchor","middle"); t1.setAttribute("dominant-baseline","middle");
    t1.setAttribute("fill",s.color); t1.setAttribute("font-weight","500");
    t1.textContent=s.label; g.appendChild(t1);

    const t2=document.createElementNS(NS,"text");
    t2.setAttribute("x",x+NW/2); t2.setAttribute("y",y+NH/2+8);
    t2.setAttribute("font-size","6"); t2.setAttribute("font-family","DM Mono,monospace");
    t2.setAttribute("text-anchor","middle"); t2.setAttribute("dominant-baseline","middle");
    t2.setAttribute("fill","rgba(255,255,255,0.22)");
    t2.textContent=`Stage ${i+1}`; g.appendChild(t2);

    g.addEventListener("click", e => {
      e.stopPropagation();
      buildPanel(s.eyebrow, s.label, tabs, tab => renderer(s, tab));
    });
    svg.appendChild(g);
  });
}
